<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>艺卷 · 点餐二维码</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #faf7f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 360px;
      width: 100%;
    }
    .brand {
      font-size: 28px;
      font-weight: bold;
      color: #b71c1c;
      letter-spacing: 4px;
      margin-bottom: 4px;
    }
    .sub { font-size: 13px; color: #999; margin-bottom: 24px; letter-spacing: 2px; }
    #qrcode { margin: 0 auto 20px; }
    #qrcode canvas, #qrcode img { border-radius: 8px; }
    .url {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #666;
      word-break: break-all;
      margin-bottom: 16px;
    }
    .tip { font-size: 12px; color: #999; line-height: 1.8; }
    .tip strong { color: #b71c1c; }
    .print-btn {
      margin-top: 20px;
      background: #b71c1c;
      color: #fff;
      border: none;
      padding: 10px 32px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
    }
    @media print {
      body { background: #fff; }
      .print-btn { display: none; }
      .card { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">艺卷</div>
    <div class="sub">新中式茶饮 · 匠心手作</div>
    <div id="qrcode"></div>
    <div class="url" id="urlText"></div>
    <div class="tip">
      📱 微信/支付宝 <strong>扫码点餐</strong><br>
      🚚 满30元免费配送
    </div>
    <button class="print-btn" onclick="window.print()">🖨️ 打印二维码</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    const url = 'https://d03b95c2b11041ad9e75c0dbee4c33f1.app.codebuddy.work';
    document.getElementById('urlText').textContent = url;
    new QRCode(document.getElementById('qrcode'), {
      text: url,
      width: 220,
      height: 220,
      colorDark: '#b71c1c',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
</body>
</html>
